services:
  analyzer:
    build: .
    image: es-sr-analyzer:latest
    container_name: es-sr-analyzer
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.docker.compose.project=es-sr-analyzer"
      - "traefik.enable=false"

services:
  analyzer:
    image: ghcr.io/dnwong/es-sr-analyzer:latest
    container_name: es-sr-analyzer
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    dns:
      - 8.8.8.8
      - 8.8.4.4
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
